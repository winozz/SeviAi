services:
  - type: web
    name: seviai-api
    runtime: docker
    dockerfilePath: deployment/Dockerfile.render
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: claude
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        value: "https://godwincreates.net,http://godwincreates.net,https://www.godwincreates.net,http://www.godwincreates.net,https://godwinllabres.github.io,http://localhost:5173"
